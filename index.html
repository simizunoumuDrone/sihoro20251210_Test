<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>超診断（JSが動くか確認）</title>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; }
    #panel{
      position:fixed; left:10px; top:10px; z-index:999999;
      background:rgba(0,0,0,0.85); color:#fff;
      padding:10px 12px; border-radius:8px;
      font:13px/1.5 sans-serif; max-width:92vw; white-space:pre-wrap;
    }
    #map{ position:absolute; left:0; right:0; top:0; bottom:0; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="panel">HTML表示OK（ここが見えていれば index.html は反映されています）</div>

<script>
(() => {
  const panel = document.getElementById('panel');
  const lines = [];
  const add = (s) => { lines.push(s); panel.textContent = lines.join("\n"); };

  // 1) JSが動いているか（必ず最初に表示）
  add("JS開始: OK  " + new Date().toLocaleString());
  add("URL: " + location.href);

  // 2) JSエラーが起きたら必ず表示（真っ白回避）
  window.addEventListener('error', (e) => {
    add("❌ JSエラー: " + (e.message || e.error || e));
  });
  window.addEventListener('unhandledrejection', (e) => {
    add("❌ Promiseエラー: " + (e.reason || e));
  });

  // 3) Leafletの置き場候補（ここは固定）
  const candidates = [
    { name:"./leaflet/",      css:"./leaflet/leaflet.css",      js:"./leaflet/leaflet.js",      img:"./leaflet/images/layers.png" },
    { name:"./leaflet/dist/", css:"./leaflet/dist/leaflet.css", js:"./leaflet/dist/leaflet.js", img:"./leaflet/dist/images/layers.png" },
    { name:"./dist/",         css:"./dist/leaflet.css",         js:"./dist/leaflet.js",         img:"./dist/images/layers.png" },
  ];

  // 4) タイムアウト付きでCSS/JSを読む（fetch不使用）
  const loadCSS = (href, ms=2500) => new Promise((resolve, reject) => {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = href + "?v=" + Date.now();
    const t = setTimeout(() => reject(new Error("CSS timeout")), ms);
    link.onload = () => { clearTimeout(t); resolve("OK"); };
    link.onerror = () => { clearTimeout(t); reject(new Error("CSS error")); };
    document.head.appendChild(link);
  });

  const loadJS = (src, ms=2500) => new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = src + "?v=" + Date.now();
    const t = setTimeout(() => reject(new Error("JS timeout")), ms);
    s.onload = () => { clearTimeout(t); resolve("OK"); };
    s.onerror = () => { clearTimeout(t); reject(new Error("JS error")); };
    document.head.appendChild(s);
  });

  const loadIMG = (src, ms=2500) => new Promise((resolve, reject) => {
    const img = new Image();
    const t = setTimeout(() => reject(new Error("IMG timeout")), ms);
    img.onload = () => { clearTimeout(t); resolve("OK"); };
    img.onerror = () => { clearTimeout(t); reject(new Error("IMG error")); };
    img.src = src + "?v=" + Date.now();
  });

  // 5) 画像ファイル（sihoro）も存在確認（jpg/JPG両方）
  const imgCandidates = ["./sihoro_20251210.jpg", "./sihoro_20251210.JPG"];

  async function checkSihoroImage(){
    add("");
    add("=== 解析画像（sihoro_20251210）の存在確認 ===");
    for (const u of imgCandidates){
      try { await loadIMG(u, 2000); add("✅ " + u + " : OK"); return u; }
      catch(e){ add("❌ " + u + " : " + e.message); }
    }
    add("→ 解析画像は見つかりません（ファイル名/場所/大小文字を確認）");
    return null;
  }

  // 6) Leaflet候補を順に試す（1つでも成功したら地図を出す）
  async function tryLeaflet(){
    add("");
    add("=== Leaflet の置き場診断（候補を順に試します）===");
    for (const c of candidates){
      add("");
      add("▶ 試行: " + c.name);
      add("  CSS: " + c.css);
      add("  JS : " + c.js);
      add("  IMG: " + c.img);

      try {
        await loadCSS(c.css);
        add("  ✅ CSS OK");
      } catch(e){
        add("  ❌ CSS NG: " + e.message);
        continue;
      }

      try {
        await loadJS(c.js);
        add("  ✅ JS OK");
      } catch(e){
        add("  ❌ JS NG: " + e.message);
        continue;
      }

      // JSが読めたら L があるか確認
      if (typeof L === "undefined"){
        add("  ❌ L が未定義（leaflet.jsが中身違い/読み込み失敗）");
        continue;
      }
      add("  ✅ L 定義OK（Leaflet起動可能）");

      // images確認（任意だが、あると安心）
      try { await loadIMG(c.img, 1200); add("  ✅ images OK"); }
      catch(e){ add("  ⚠ images NG: " + e.message + "（地図自体は動く場合があります）"); }

      return c;
    }
    throw new Error("Leaflet をどの候補からも読み込めませんでした");
  }

  // 7) 地図表示（Leafletが見つかった場合のみ）
  function startMap(leafletInfo, sihoroImageUrl){
    add("");
    add("=== 地図表示 ===");
    const bounds = [
      [43.164612494, 143.139904716],
      [43.16595066,  143.143384195]
    ];

    const map = L.map("map");
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap contributors"
    }).addTo(map);

    L.rectangle(bounds, {color:"red", weight:2, fillOpacity:0.15}).addTo(map);
    map.fitBounds(bounds);

    if (sihoroImageUrl){
      L.imageOverlay(sihoroImageUrl + "?v=" + Date.now(), bounds, {opacity:1.0}).addTo(map);
      add("✅ 解析画像を重ねました: " + sihoroImageUrl);
    } else {
      add("⚠ 解析画像は未検出なので重ねていません");
    }

    add("");
    add("✅ 完了");
    add("Leaflet: " + leafletInfo.name);
  }

  // 実行
  (async () => {
    try{
      const sihoroUrl = await checkSihoroImage();
      const leafletInfo = await tryLeaflet();
      startMap(leafletInfo, sihoroUrl);
    }catch(e){
      add("");
      add("❌ 結果: 失敗");
      add(String(e));
      add("");
      add("→ 原因は『leaflet.js/leaflet.css のパス（置き場）』か『ファイル名大小文字』です。");
    }
  })();

})();
</script>
</body>
</html>
