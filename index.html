<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Web GIS ダッシュボード</title>

  <!-- ✅ Leafletをリポジトリ内から読み込み（CDN不使用） -->
  <link rel="stylesheet" href="./leaflet/leaflet.css" />
  <script src="./leaflet/leaflet.js"></script>

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
    #map { width: 100%; height: 100%; }
  </style>
</head>

<body>
  <div id="map"></div>

  <script>
    // 確定した bounds（EPSG:4326）
    const bounds = [
      [43.164612494, 143.139904716], // 南西
      [43.16595066,  143.143384195]  // 北東
    ];

    // 地図
    const map = L.map('map');

    // 背景地図
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // 解析画像（キャッシュ回避で ?v= を付ける）
    const img = L.imageOverlay(
      './sihoro_20251210.JPG?v=1',
      bounds,
      { opacity: 1.0 }
    ).addTo(map);

    // 画像範囲へズーム
    map.fitBounds(bounds);

    // レイヤ切り替え
    L.control.layers(
      { '地図（OSM）': osm },
      { '解析画像（2025/12/10）': img }
    ).addTo(map);
  </script>
</body>
</html>
