<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Web GIS ダッシュボード</title>

  <!-- Leaflet CSS（必須） -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Leaflet JS（必須） -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script>
    // -------- 画像の表示範囲（確定値） --------
    var bounds = [
      [43.164612494, 143.139904716], // 南西（lat, lon）
      [43.16595066,  143.143384195]  // 北東（lat, lon）
    ];

    // -------- ベースマップ --------
    var baseMap = L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      { attribution: '© OpenStreetMap contributors' }
    );

    // -------- 解析画像レイヤ（JPG） --------
    var analysisLayer = L.imageOverlay(
      'https://simizunumDrone.github.io/sohoron20251210_Test/sihoro_20251210.JPG',
      bounds,
      { opacity: 1.0 }
    );

    // -------- 地図初期化 --------
    var map = L.map('map', {
      layers: [baseMap, analysisLayer]
    });

    // 画像範囲にズーム
    map.fitBounds(bounds);

    // -------- レイヤ切り替えUI --------
    var baseLayers = {
      "地図（OSM）": baseMap
    };

    var overlays = {
      "解析画像": analysisLayer
    };

    L.control.layers(baseLayers, overlays).addTo(map);
  </script>
</body>
</html>
