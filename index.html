<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>反映確認</title>
  <style>
    html, body { margin: 0; padding: 0; }
    #banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999999;
      background: #d00000;
      color: #ffffff;
      padding: 10px 12px;
      font: 16px/1.4 sans-serif;
    }
    #note {
      margin-top: 60px;
      padding: 12px;
      font: 14px/1.6 sans-serif;
    }
    code { background: #f3f3f3; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>

<body>
  <div id="banner">✅ TEST-123（この赤帯が見えれば、最新index.htmlが配信されています）</div>

  <div id="note">
    <p>これは <strong>反映確認専用</strong> のページです。地図やLeafletはまだ読み込みません。</p>
    <p>赤帯の <code>TEST-123</code> が見えれば、GitHub Pages の更新が反映できています。</p>
    <p>見えなければ、キャッシュ or URL違いの可能性が高いです。</p>
  </div>
</body>
</html>
