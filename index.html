<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>地図テスト</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  #map {
    width: 100%;
    height: 100vh;
  }
</style>
</head>

<body>
<div id="map"></div>

<script>
  var map = L.map('map').setView([43.2, 142.8], 8);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // ★ここが重要（PNGの名前を指定）
  var imageUrl = 'https://simizunumDrone.github.io/sohoron20251210_Test/sihoro_20251210.png'';

  var imageBounds = [
    [43.1646124940000036, 143.1399047159999895],
    [43.1659506600000000, 143.1433841950000101]
  ];

  L.imageOverlay(imageUrl, imageBounds).addTo(map);
</script>
</body>
</html>
