<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Leaflet Rectangle Test</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.cssm/leaflet@1.9.js
</script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}
#map {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>
<div id="map"></div>

<script>
  // 地図初期化
  var map = L.map('map').setView([43.1653, 143.1416], 17);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  // あなたの bounds
  var bounds = [
    [43.164612494, 143.139904716],
    [43.16595066,  143.143384195]
  ];

  // 赤い四角
  L.rectangle(bounds, {
    color: 'red',
    weight: 2,
    fillOpacity: 0.3
  }).addTo(map);

  map.fitBounds(bounds);
</script>
</body>
</html>
