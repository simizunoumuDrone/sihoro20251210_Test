<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Map restore</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
}
#map {
  width: 100%;
  height: 100vh;
}
</style>
</head>
<body>

<div id="map"></div>

<script>
var map = L.map('map').setView([43.1653, 143.1416], 16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

var imageUrl = 'https://simizunumDrone.github.io/sohoron20251210_Test/sohoro_20251210.png';

/* 💡 わざと「広すぎる範囲」にしています */
var imageBounds = [
  [43.13, 143.13],
  [43.18, 143.18]
];

L.imageOverlay(imageUrl, imageBounds).addTo(map);
</script>

</body>
</html>
