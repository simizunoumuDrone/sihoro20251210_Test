<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Web GIS ダッシュボード</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
rc="https://unpkg.com/leaflet@1.9.4  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script>
    // 表示範囲（確定値）
    const bounds = [
      [43.164612494, 143.139904716], // 南西（lat, lon）
      [43.16595066,  143.143384195]  // 北東（lat, lon）
    ];

    // 背景地図
    const baseMap = L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      { attribution: '© OpenStreetMap contributors' }
    );

    // JPG 解析画像
    const imageLayer = L.imageOverlay(
      'https://simizunumDrone.github.io/sihoro20251210_Test/sihoro_20251210.JPG',
      bounds,
      { opacity: 1.0 }
    );

    // 地図初期化
    const map = L.map('map', {
      layers: [baseMap, imageLayer]
    });

    map.fitBounds(bounds);

    // レイヤ切り替え（ダッシュボード）
    L.control.layers(
      { "地図（OSM）": baseMap },
      { "解析画像": imageLayer }
    ).addTo(map);
  </script>
</body>
</html>
