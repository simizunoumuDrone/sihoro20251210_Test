<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leaflet 自動探索・診断（sihoro対応）</title>

  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; }
    #map { width:100%; height:100%; }
    #log {
      position: fixed; left: 10px; top: 10px; z-index: 999999;
      background: rgba(0,0,0,0.80); color: #fff;
      padding: 10px 12px; border-radius: 8px;
      font: 13px/1.4 sans-serif;
      max-width: 92vw; white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <div id="log">起動中…</div>

<script>
(function () {
  const logEl = document.getElementById('log');
  const log = (msg) => { logEl.textContent = msg; };

  // Leaflet の候補パス（置き場が違っても自動で探します）
  const CANDIDATES = [
    { base: "./leaflet",       css: "leaflet.css", js: "leaflet.js" },      // ./leaflet/leaflet.js
    { base: "./leaflet/dist",  css: "leaflet.css", js: "leaflet.js" },      // ./leaflet/dist/leaflet.js
    { base: "./dist",          css: "leaflet.css", js: "leaflet.js" },      // ./dist/leaflet.js
  ];

  // もし社内ネットワークで CDN が使えない場合は失敗します（診断目的の予備）
  const CDN = {
    css: "https://unpkg.com/leaflet@1.9.4/dist/leaflet.css",
    js:  "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  };

  // 画像の表示範囲（確定値）
  const BOUNDS = [
    [43.164612494, 143.139904716],
    [43.16595066,  143.143384195]
  ];

  // ★ファイル名は sihoro に統一（jpg/JPG も両方探す）
  const IMAGE_CANDIDATES = [
    "./sihoro_20251210.jpg",
    "./sihoro_20251210.JPG"
  ];

  function loadCSS(url) {
    return new Promise((resolve, reject) => {
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = url + (url.includes("?") ? "" : ("?v=" + Date.now()));
      link.onload = () => resolve(url);
      link.onerror = () => reject(new Error("CSS failed: " + url));
      document.head.appendChild(link);
    });
  }

  function loadJS(url) {
    return new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = url + (url.includes("?") ? "" : ("?v=" + Date.now()));
      s.onload = () => resolve(url);
      s.onerror = () => reject(new Error("JS failed: " + url));
      document.head.appendChild(s);
    });
  }

  async function urlExists(url) {
    try {
      const r = await fetch(url + "?v=" + Date.now(), { method: "HEAD" });
      return r.ok;
    } catch {
      try {
        const r = await fetch(url + "?v=" + Date.now(), { method: "GET" });
        return r.ok;
      } catch {
        return false;
      }
    }
  }

  async function tryLocalLeaflet() {
    for (const c of CANDIDATES) {
      const cssUrl = `${c.base}/${c.css}`;
      const jsUrl  = `${c.base}/${c.js}`;

      const cssOk = await urlExists(cssUrl);
      const jsOk  = await urlExists(jsUrl);

      log(
        "Leaflet 自動探索中…\n\n" +
        `候補: ${c.base}\n` +
        `  CSS: ${cssUrl} => ${cssOk ? "OK" : "NG"}\n` +
