<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Leaflet Bounds Test</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}
#map {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>
<div id="map"></div>

<script>
  // 地図
  var map = L.map('map');

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // あなたが出した正しい範囲
  var bounds = [
    [43.164612494, 143.139904716],
    [43.16595066,  143.143384195]
  ];

  // ★ 赤い四角を描く（PNGは一切使わない）
  L.rectangle(bounds, {
    color: "red",
    weight: 2,
    fillOpacity: 0.4
  }).addTo(map);

  // 必ずそこへズーム
  map.fitBounds(bounds);
</script>
</body>
</html>
